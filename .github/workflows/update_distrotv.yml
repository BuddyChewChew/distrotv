name: Update DistroTV Playlist and EPG

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Run Scraper
        run: python scraper.py

      - name: Deploy to Repo
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add the files to ensure they are staged
          git add distrotv.m3u distrotv_epg.xml distrotv_channels.json
          
          # Commit using allow-empty just in case, but the timestamp ensures a change
          git commit --allow-empty -m "Fresh Streams & Headers: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          
          git push origin main
