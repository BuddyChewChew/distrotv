name: Update DistroTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We can point directly to the requirements if you make the .txt file
          pip install requests==2.31.0 typing-extensions==4.7.1

      # If you prefer to keep ONLY the .yml file, use this instead:
      # - name: Install from YAML
      #   run: pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Run DistroTV Scraper
        run: python scraper.py

      - name: Deploy to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add distrotv_channels.json
          # If you add M3U support later, include it here:
          # git add distrotv.m3u
          git commit -m "Update DistroTV Playlist: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || exit 0
          git push
