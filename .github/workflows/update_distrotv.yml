name: Update DistroTV Playlist and EPG

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:      # Allows you to force run it manually
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Critical for allowing the bot to push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetches full history for a cleaner push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Run Scraper
        run: python scraper.py

      - name: Deploy and Force Push
        run: |
          # Configure identity
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Clean and Sync: Ensure we are starting from the latest remote state
          git pull origin main --rebase
          
          # Stage the new files generated by scraper.py
          git add distrotv.m3u distrotv_epg.xml distrotv_channels.json
          
          # Commit the changes (allow-empty ensures it doesn't fail if nothing changed)
          git commit --allow-empty -m "Force Update Streams & Headers: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          
          # Force Push: Overwrites the remote file with the fresh local version
          git push --force origin main
