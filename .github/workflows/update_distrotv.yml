name: Update DistroTV Playlist and EPG

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main               # Runs on every push to main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Run DistroTV Scraper
        run: python scraper.py

      - name: Run EPG Generator
        run: python epg_gen.py

      - name: Deploy to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the JSON data, M3U playlist, and XML EPG
          git add distrotv_channels.json distrotv.m3u distrotv_epg.xml
          
          # Commit only if changes exist
          git commit -m "Update DistroTV Data: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || exit 0
          
          git push
